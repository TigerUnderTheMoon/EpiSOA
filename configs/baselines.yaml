seed: 13
run_id: pubevent-soa-lite-baselines
mode: mock

data:
  evidence_path: data/pubevent_soa_lite/evidence.jsonl
  gold_path: data/pubevent_soa_lite/gold_tuples.jsonl
  event_query_path: data/pubevent_soa_lite/events.jsonl
  dataset_name: pubevent_soa_lite
  gold_event_chains_path: data/pubevent_soa_lite/gold_event_chains.jsonl

output:
  run_dir: outputs/runs/{run_id}

model:
  mode: mock
  llm_mode: mock
  llm_model: mock-attribution
  embedding_model: mock-embedding
  reranker_model: mock-reranker
  api_key_env: OPENAI_API_KEY
  base_url: http://localhost:8000/v1
  timeout_seconds: 30
  max_retries: 2
  temperature: 0
  prompt_version: baseline-v0

retrieval:
  top_k: 5
  candidate_k: 5
  use_diversity: true
  embedding_mode: mock
  reranker_mode: mock
  cache_dir: outputs/cache/embeddings

graph:
  enabled: true

event_chain:
  max_depth: 2
  top_k: 3
  enabled: true

verifier:
  threshold: 0.75
  enabled: true

ablation:
  disable_fsm: false
  disable_diversity: false
  disable_graph: false
  disable_event_chain: false
  disable_verifier: false
  disable_temporal_edges: false
  disable_stakeholder_constraint: false

methods:
  direct_llm:
    top_k: 5
  few_shot_llm:
    top_k: 5
  vanilla_rag:
    top_k: 5
  graph_rag_style:
    top_k: 5
    depth: 2
  event_only_retrieval:
    top_k: 5
  episoa_full:
    top_k_evidence: 5
    eventrag_depth: 2
    eventrag_top_k: 3
