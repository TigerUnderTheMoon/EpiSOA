  gold_event_chains_path: data/pubevent_soa_lite/gold_event_chains.jsonl
output:
  runs_dir: outputs/runs
ablation:
  settings:
    - full
    - without_graph
    - without_event_chain
    - without_verifier
retrieval:
  top_k: 5
verifier:
  threshold: 0.75
