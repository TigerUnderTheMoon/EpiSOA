search:
  provider: custom

  # Active provider: Bocha
  # Prefer environment variables in public repositories.
  api_key: ""
  api_key_env: BOCHA_API_KEY
  base_url: "https://api.bocha.cn/v1/web-search"
  base_url_env: BOCHA_BASE_URL

  timeout_seconds: 30
  max_retries: 2
  retry_backoff_seconds: 0.5

search_backups:
  anspire:
    provider: custom
    api_key: ""
    api_key_env: SEARCH_API_KEY
    base_url: "https://plugin.anspire.cn/api/ntsearch/search"
    base_url_env: SEARCH_BASE_URL
    timeout_seconds: 30
    max_retries: 2

collector:
  source_types:
    - news
    - official
    - public_interaction
    - forum
    - public_social
    - public_web

  max_results_per_query: 10
  max_evidence_per_event: 50
  sleep_seconds: 0.5

  query_planner:
    mode: heuristic
