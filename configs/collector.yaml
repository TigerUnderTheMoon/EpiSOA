search:
  provider: custom
  api_key: "sk-pNyeh6BI766bdhSiiSWPjSHsRZAUgtdc"
  api_key_env: SEARCH_API_KEY
  base_url: "https://plugin.anspire.cn/api/ntsearch/search"
  base_url_env: SEARCH_BASE_URL
  timeout_seconds: 30
  max_retries: 2
collector:
  source_types:
    - news
    - official
    - public_interaction
    - forum
    - public_social
    - public_web
  max_results_per_query: 10
  max_evidence_per_event: 50
  sleep_seconds: 0.5
  query_planner:
    mode: heuristic
    ga:
      enabled: false
      population_size: 12
      generations: 2
      individual_size: 6
      tournament_size: 3
      mutation_rate: 0.25
      probe_max_results_per_query: 3
      random_seed: 42
      weights:
        relevance: 0.30
        entity_coverage: 0.25
        source_coverage: 0.15
        traceability: 0.10
        stakeholder_coverage: 0.08
        stance_diversity: 0.05
        redundancy_penalty: 0.05
        cost_penalty: 0.02
