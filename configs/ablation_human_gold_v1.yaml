run_id: pubevent-soa-lite-human-gold-v1-ablation
mode: ablation
seed: 42
data:
  events_path: data/pubevent_soa_lite/events.jsonl
  raw_posts_path: data/pubevent_soa_lite/raw/raw_posts.jsonl
  evidence_candidates_path: data/pubevent_soa_lite/interim/evidence_candidates.jsonl
  evidence_path: data/pubevent_soa_lite/evidence_v3_repaired_plus_low37.jsonl
  annotation_sheet_path: data/pubevent_soa_lite/human_gold_v1/human_tuple_adjudication_sheet.csv
  gold_tuple_path: data/pubevent_soa_lite/human_gold_v1/human_gold_tuples_v1.jsonl
  gold_chain_path: data/pubevent_soa_lite/human_gold_v1/human_gold_event_chains_v1.jsonl
  gold_tuples_path: data/pubevent_soa_lite/human_gold_v1/human_gold_tuples_v1.jsonl
  gold_event_chains_path: data/pubevent_soa_lite/human_gold_v1/human_gold_event_chains_v1.jsonl
output:
  runs_dir: outputs/runs_human_gold_v1
ablation:
  settings:
    - full
    - without_graph
    - without_event_chain
    - without_verifier
    - without_event_chain_prompt
    - without_event_chain_ranking
model:
  mode: real
  llm_mode: real
  provider: openai_compatible
  llm_model: "deepseek-v4-flash"
  model_name: "deepseek-v4-flash"
  embedding_model: mock-embedding
  reranker_model: mock-reranker
  api_key: ""
  api_key_env: "OPENCODE_API_KEY"
  base_url: "https://opencode.ai/zen/go/v1"
  base_url_env: "OPENCODE_BASE_URL"
  temperature: 0.1
  max_tokens: 8000
  timeout_seconds: 180
  max_retries: 2
search:
  provider: custom
  api_key_env: SEARCH_API_KEY
  base_url_env: SEARCH_BASE_URL
  timeout_seconds: 30
  max_retries: 2
retrieval:
  top_k: 5
verifier:
  threshold: 0.75
